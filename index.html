<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analyse Résultats Gatling</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e0e0e0; min-height: 100vh; }

    /* ── Header ── */
    header { background: #1a1d2e; border-bottom: 2px solid #ff6b35; padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; }
    header h1 { font-size: 1.4rem; color: #ff6b35; font-weight: 700; letter-spacing: 0.03em; }
    header .subtitle { font-size: 0.85rem; color: #888; }

    /* ── Source bar ── */
    #source-bar { background: #141622; border-bottom: 1px solid #2a2d3e; }
    .tab-strip { display: flex; padding: 0 2rem; border-bottom: 1px solid #2a2d3e; }
    .tab-btn { padding: 0.6rem 1.2rem; font-size: 0.88rem; font-weight: 600; color: #666; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; transition: color 0.15s, border-color 0.15s; margin-bottom: -1px; }
    .tab-btn:hover { color: #aaa; }
    .tab-btn.active { color: #ff6b35; border-bottom-color: #ff6b35; }
    .tab-panel { display: none; padding: 1rem 2rem; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .tab-panel.active { display: flex; }
    #url-bar label, #file-bar label { font-size: 0.9rem; color: #aaa; white-space: nowrap; }
    #stats-url { flex: 1; min-width: 260px; padding: 0.5rem 0.8rem; border-radius: 6px; border: 1px solid #3a3d50; background: #1e2135; color: #e0e0e0; font-size: 0.95rem; }
    #stats-url:focus { outline: none; border-color: #ff6b35; }
    #drop-zone { flex: 1; min-width: 260px; min-height: 64px; border: 2px dashed #3a3d50; border-radius: 8px; background: #1e2135; color: #777; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: border-color 0.15s, background 0.15s; padding: 0.5rem 1rem; text-align: center; }
    #drop-zone:hover, #drop-zone.drag-over { border-color: #ff6b35; background: #1e2135ee; color: #ccc; }
    #drop-zone.has-file { border-color: #2ecc71; color: #2ecc71; }
    #file-input { display: none; }
    .load-btn { padding: 0.5rem 1.4rem; border-radius: 6px; border: none; background: #ff6b35; color: #fff; font-weight: 600; font-size: 0.95rem; cursor: pointer; transition: background 0.15s; }
    .load-btn:hover { background: #e05520; }
    .load-btn:disabled { background: #555; cursor: not-allowed; }

    /* ── Status ── */
    #status { display: none; margin: 1rem 2rem 0; padding: 0.7rem 1rem; border-radius: 6px; font-size: 0.9rem; white-space: pre-line; line-height: 1.6; }
    #status.error { background: #2e1515; border: 1px solid #c0392b; color: #e74c3c; }
    #status.info  { background: #12232e; border: 1px solid #2980b9; color: #5dade2; }

    /* ── Toolbar ── */
    #toolbar { display: none; padding: 0.75rem 2rem; gap: 1rem; align-items: center; flex-wrap: wrap; background: #141622; border-bottom: 1px solid #2a2d3e; }
    #search { padding: 0.45rem 0.8rem; border-radius: 6px; border: 1px solid #3a3d50; background: #1e2135; color: #e0e0e0; font-size: 0.9rem; width: 280px; }
    #search:focus { outline: none; border-color: #ff6b35; }
    #count-label { font-size: 0.85rem; color: #666; margin-left: auto; }

    /* ── Main content ── */
    main { padding: 1rem 2rem 2rem; }

    /* ── Table sections ── */
    .tbl-section { margin-bottom: 2.5rem; }
    .tbl-section-title { font-size: 1rem; font-weight: 700; color: #ff6b35; padding: 0.4rem 0; border-bottom: 1px solid #2a2d3e; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.5rem; }
    .section-badge { font-size: 0.72rem; background: #ff6b3533; color: #ff6b35; border-radius: 4px; padding: 0.1rem 0.45rem; }
    .tbl-wrapper { overflow-x: auto; }

    /* ── Compact table ── */
    .compact-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; table-layout: auto; }
    .compact-table thead tr { background: #12141f; }
    .compact-table th { padding: 0.4rem 0.6rem; color: #888; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 2px solid #2a2d3e; white-space: nowrap; }
    .th-sort { cursor: pointer; user-select: none; transition: color 0.12s; }
    .th-sort:hover { color: #ccc; }
    .th-sort.active { color: #ff6b35; }
    .th-expand { width: 24px; }

    .compact-table tbody tr.data-row { cursor: pointer; transition: background 0.1s; }
    .compact-table tbody tr.data-row:hover td { background: #1e2135; }
    .compact-table td { padding: 0.35rem 0.6rem; border-bottom: 1px solid #1e2135; color: #c8d0e0; white-space: nowrap; vertical-align: middle; }
    .compact-table tr.data-row:hover + tr.detail-row td { background: #1e2135; }

    .expand-cell { color: #555; font-size: 0.65rem; text-align: center; width: 22px; }
    .col-name { white-space: normal; word-break: break-word; min-width: 180px; color: #dde4f0; font-weight: 500; }
    .val-ok  { color: #2ecc71; }
    .val-ko  { color: #e74c3c; }
    .band-pct { font-size: 0.75em; color: #888; }
    .th-detail { width: 36px; text-align: center; }
    .detail-link-cell { text-align: center; white-space: nowrap; }
    .detail-link-cell a { font-size: 1rem; text-decoration: none; opacity: 0.7; transition: opacity 0.15s; }
    .detail-link-cell a:hover { opacity: 1; }
    .breadcrumb { padding: 0.6rem 1rem; font-size: 0.88rem; color: #888; }
    .breadcrumb a { color: #ff6b35; text-decoration: none; }
    .breadcrumb a:hover { text-decoration: underline; }

    /* ── Detail panel (expanded row) ── */
    .detail-row td.detail-cell { padding: 0; background: #0f1117; }
    .detail-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .detail-table th { text-align: left; padding: 0.4rem 1rem; color: #888; font-weight: 500; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; background: #12141f; border-bottom: 1px solid #2a2d3e; }
    .detail-table td { padding: 0.4rem 1rem; border-bottom: 1px solid #1e2135; color: #c8d0e0; }
    .detail-table tr:last-child td { border-bottom: none; }
    .detail-table td.detail-metric { color: #8899bb; font-size: 0.8rem; width: 35%; }
    .band-row td { color: #b0b8c8; font-style: italic; }
    .no-stats { padding: 1rem; color: #555; }

    /* ── Onglet Arborescence ── */
    #tree-bar { display: none; padding: 0.75rem 2rem; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    #tree-bar.active { display: flex; }
    #tree-root-input { flex: 1; min-width: 300px; padding: 0.5rem 0.8rem; border-radius: 6px; border: 1px solid #3a3d50; background: #1e2135; color: #e0e0e0; font-size: 0.95rem; }
    #tree-root-input:focus { outline: none; border-color: #ff6b35; }
    #tree-container { padding: 0.5rem 2rem 1rem; display: none; }
    #tree-container.active { display: block; }
    /* ── Onglet Arborescence FTP ── */
    #ftp-bar { display: none; padding: 0.75rem 2rem; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    #ftp-bar.active { display: flex; }
    #ftp-path-input { flex: 1; min-width: 300px; padding: 0.5rem 0.8rem; border-radius: 6px; border: 1px solid #3a3d50; background: #1e2135; color: #e0e0e0; font-size: 0.95rem; }
    #ftp-path-input:focus { outline: none; border-color: #ff6b35; }
    #ftp-container { padding: 0.5rem 2rem 1rem; display: none; }
    #ftp-container.active { display: block; }
    #ftp-status-badge { font-size: 0.78rem; color: #6677aa; white-space: nowrap; }
    #ftp-nav-sticky { display: none; background: #141622; border-bottom: 1px solid #2a2d3e; padding: 0.45rem 2rem; }
    #ftp-nav-sticky.active { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }

    /* Barre de navigation (fil d'Ariane + bouton parent) */
    .tree-nav-bar { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap;
                    padding: 0.5rem 0 0.75rem; border-bottom: 1px solid #2a2d3e; margin-bottom: 0.6rem; }
    /* Fil d'Ariane permanent (toujours visible après chargement) */
    #tree-nav-sticky { display: none; background: #141622; border-bottom: 1px solid #2a2d3e;
                       padding: 0.45rem 2rem; }
    #tree-nav-sticky.active { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .tree-breadcrumb { display: flex; align-items: center; flex-wrap: wrap; gap: 0.15rem;
                       font-size: 0.82rem; flex: 1; min-width: 0; }
    .bc-seg { color: #8899bb; white-space: nowrap; padding: 0.15rem 0.2rem; }
    .bc-seg.bc-current { color: #dde4f0; font-weight: 600; }
    .bc-link { color: #ff6b35; text-decoration: none; border-radius: 3px; transition: background 0.1s; }
    .bc-link:hover { text-decoration: underline; }
    .bc-sep { color: #444; padding: 0 0.1rem; font-size: 0.75rem; }
    .tree-nav-btn { padding: 0.25rem 0.75rem; border-radius: 4px; border: 1px solid #3a3d50;
                    background: #1e2135; color: #aaa; font-size: 0.8rem; cursor: pointer;
                    transition: border-color 0.12s, color 0.12s; white-space: nowrap; }
    .tree-nav-btn:hover { border-color: #ff6b35; color: #ff6b35; }

    /* Liste des répertoires */
    .tree-summary { font-size: 0.8rem; color: #555; padding: 0 0 0.4rem; }
    .tree-list { list-style: none; padding: 0; margin: 0; }
    .tree-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.4rem 0.4rem;
                 border-bottom: 1px solid #1a1d2e; border-radius: 4px; }
    .tree-item:hover { background: #1e2135; }
    .tree-item-name { flex: 1; font-family: 'Consolas', monospace; color: #666; font-size: 0.85rem;
                      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
                      text-decoration: none; cursor: pointer; }
    .tree-item-name:hover { color: #ff6b35; text-decoration: underline; }
    .tree-item-name.has-stats { color: #dde4f0; font-weight: 500; }
    .tree-item-date { font-size: 0.78rem; color: #6677aa; white-space: nowrap; font-style: italic; }
    .tree-item-btn { padding: 0.22rem 0.75rem; border-radius: 4px; border: 1px solid #ff6b35;
                     background: transparent; color: #ff6b35; font-size: 0.78rem; font-weight: 600;
                     cursor: pointer; transition: background 0.12s, color 0.12s; white-space: nowrap; }
    .tree-item-btn:hover { background: #ff6b35; color: #fff; }
    .tree-empty { color: #555; font-size: 0.88rem; padding: 1rem 0; }
    .tree-error { color: #e74c3c; font-size: 0.88rem; padding: 1rem 0; }

    /* ── Empty state ── */
    #empty { display: none; text-align: center; padding: 4rem 2rem; color: #555; }
    #empty svg { opacity: 0.25; margin-bottom: 1rem; display: block; margin-left: auto; margin-right: auto; }

    /* ── Footer ── */
    footer { text-align: center; font-size: 0.78rem; color: #444; padding: 2rem; border-top: 1px solid #1e2135; margin-top: 2rem; }

    @media (max-width: 640px) {
      header, .tab-strip, .tab-panel, #toolbar, main { padding-left: 1rem; padding-right: 1rem; }
      .tbl-wrapper { margin: 0 -1rem; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>⚡ Analyse Résultats Gatling</h1>
    <span class="subtitle">Visualisation des statistiques de performance</span>
  </div>
</header>

<div id="source-bar">
  <div class="tab-strip">
    <button class="tab-btn active" onclick="switchTab('tree')">🗂️ Arborescence locale</button>
    <button class="tab-btn" onclick="switchTab('ftp')">🌐 Arborescence FTP</button>
    <button class="tab-btn" onclick="switchTab('file')">📂 Fichier local</button>
    <button class="tab-btn" onclick="switchTab('url')">🔗 URL</button>
  </div>
  <!-- Onglet Arborescence locale (nécessite server.py) -->
  <div class="tab-panel active" id="tree-bar">
    <label for="tree-root-input">Répertoire racine Gatling :</label>
    <input type="text" id="tree-root-input" placeholder="Chargement du chemin par défaut…" autocomplete="off" spellcheck="false" />
    <button class="load-btn" onclick="loadTree()">Parcourir</button>
  </div>
  <!-- Onglet Arborescence FTP (nécessite server.py + .env configuré) -->
  <div class="tab-panel" id="ftp-bar">
    <label for="ftp-path-input">Répertoire distant :</label>
    <input type="text" id="ftp-path-input" placeholder="Chargement…" autocomplete="off" spellcheck="false" />
    <button class="load-btn" onclick="loadTreeFtp()">Parcourir</button>
    <span id="ftp-status-badge"></span>
  </div>
  <div class="tab-panel" id="file-bar">
    <label>Fichier stats.json local :</label>
    <div id="drop-zone"
         onclick="document.getElementById('file-input').click()"
         ondragover="onDragOver(event)"
         ondragleave="onDragLeave(event)"
         ondrop="onDrop(event)">
      📁 Glisser-déposer un fichier ici, ou cliquer pour parcourir
    </div>
    <input type="file" id="file-input" accept=".json,application/json" onchange="onFileSelected(event)" />
    <button class="load-btn" id="load-btn-file" onclick="loadFromFile()" disabled>Charger</button>
  </div>
  <div class="tab-panel" id="url-bar">
    <label for="stats-url">URL du fichier stats.json :</label>
    <input type="text" id="stats-url"
      placeholder="http://localhost:8080/results/simulation/js/stats.json"
      value="" autocomplete="off" spellcheck="false" />
    <button class="load-btn" id="load-btn-url" onclick="loadFromUrl()">Charger</button>
  </div>
</div>

<!-- Fil d'Ariane permanent : toujours visible une fois l'arborescence chargée -->
<div id="tree-nav-sticky"></div>

<!-- Liste des sous-répertoires locaux -->
<div id="tree-container"></div>

<!-- Fil d'Ariane FTP permanent -->
<div id="ftp-nav-sticky"></div>

<!-- Liste des sous-répertoires FTP -->
<div id="ftp-container"></div>

<div id="status"></div>

<div id="toolbar">
  <input type="text" id="search" placeholder="🔍 Filtrer par nom…" oninput="filterCards()" />
  <span id="count-label"></span>
</div>

<!-- #empty est en dehors de <main> : il ne sera jamais efface par innerHTML='' -->
<div id="empty">
  <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
    <path d="M9 17H7A5 5 0 0 1 7 7h2M15 7h2a5 5 0 0 1 0 10h-2M8 12h8"/>
  </svg>
  <p>Aucun résultat. Saisissez l’URL d’un fichier <code>stats.json</code> Gatling et cliquez sur « Charger ».</p>
</div>

<main id="main-content"></main>

<footer>
  Analyse Résultats Gatling &mdash; JSON généré par
  <a href="https://gatling.io" style="color:#ff6b35;text-decoration:none">Gatling</a>
</footer>

<script src="app.js?v=20260319" charset="utf-8"></script>
</body>
</html>
